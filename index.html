<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro Pierre — Meta Ads · Jun–Jul 2026</title>
<style>
/* ── TOKENS ── */
:root{
  --bg:#fff;--ink:#111;--b:#ddd;--soft:#f7f7f7;--mut:#888;
  --grn:#1a7a1a;--red:#c0392b;--amb:#7a5800;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
header{border-bottom:2px solid var(--ink);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.brand{font-size:17px;font-weight:800;letter-spacing:-.5px}
.brand small{display:block;font-size:11px;font-weight:400;color:var(--mut);margin-top:1px}
.hbtns{display:flex;gap:8px}
.hbtn{border:1.5px solid var(--b);padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;background:#fff;transition:all .15s;white-space:nowrap}
.hbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ── NAV ── */
.nav{padding:10px 16px 0;border-bottom:1px solid var(--b);overflow-x:auto}
.tabs{display:flex;border:1.5px solid var(--b);border-radius:8px;overflow:hidden;width:fit-content;margin-bottom:10px;min-width:0}
.tab{padding:6px 13px;font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:var(--mut);border:none;border-right:1.5px solid var(--b);white-space:nowrap;transition:all .15s;flex-shrink:0}
.tab:last-child{border-right:none}
.tab.on{background:var(--ink);color:#fff}
.tab:hover:not(.on):not(.dis){background:#f0f0f0;color:var(--ink)}
.tab.dis{opacity:.3;cursor:not-allowed;pointer-events:none}
.tab.liv::after{content:' ●';font-size:9px;color:#e67e22}
.tab.on.liv::after{color:#FFD700}

/* ── MAIN ── */
main{padding:16px;max-width:1100px}

/* ── SECTION LABEL ── */
.sec{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--mut);margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--b)}
.sec:first-child{margin-top:8px}

/* ── KPI GRID ── */
.kg{display:grid;gap:8px;margin-bottom:4px}
.k2{grid-template-columns:1fr 1fr}
.k4{grid-template-columns:1fr 1fr}
@media(min-width:600px){.k4{grid-template-columns:repeat(4,1fr)}}
.k7{grid-template-columns:repeat(2,1fr)}
@media(min-width:500px){.k7{grid-template-columns:repeat(4,1fr)}}
@media(min-width:800px){.k7{grid-template-columns:repeat(7,1fr)}}
.kc{border:1.5px solid var(--b);border-radius:10px;padding:12px 13px}
.kc.hi{border-color:var(--ink);border-width:2px}
.kl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-bottom:4px}
.kv{font-size:19px;font-weight:800;letter-spacing:-.5px;line-height:1}
.ks{font-size:11px;color:var(--mut);margin-top:3px}
.kd{font-size:11px;font-weight:600;margin-top:4px}
.up{color:var(--grn)}.dn{color:var(--red)}.nt{color:var(--mut)}

/* ── DUAL BAR CHART ── */
.chart-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:4px 0 20px}
.chart{display:flex;align-items:flex-end;gap:4px;min-width:360px;padding-top:28px;border-bottom:2px solid var(--ink);position:relative}
.cg{flex:1;display:flex;flex-direction:column;align-items:center;min-width:44px}
.cbars{display:flex;align-items:flex-end;gap:3px;width:100%;justify-content:center}
.cb{flex:1;border-radius:2px 2px 0 0;position:relative;min-width:14px}
.cb-r{background:var(--ink)}
.cb-cpr{background:#aaa}
.cnum{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:800;white-space:nowrap;color:var(--ink)}
.cb-r .cnum{color:var(--ink)}
.clabel{font-size:9px;font-weight:600;color:var(--mut);margin-top:5px;text-align:center;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chart-legend{display:flex;gap:14px;font-size:11px;font-weight:600;margin-bottom:8px;flex-wrap:wrap}
.cleg{display:flex;align-items:center;gap:5px}
.csq{display:inline-block;width:9px;height:9px;border-radius:1px}
.csq-r{background:var(--ink)}.csq-cpr{background:#aaa}

/* ── RETENTION BARS ── */
.ret{display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
.rr{display:flex;align-items:center;gap:8px}
.rl{font-size:11px;font-weight:700;width:60px;text-align:right;color:var(--mut);flex-shrink:0}
.rt{flex:1;background:var(--soft);border-radius:3px;height:20px;overflow:hidden}
.rf{height:100%;background:var(--ink);border-radius:3px;display:flex;align-items:center;padding-left:6px;color:#fff;font-size:10px;font-weight:700}
.rp{font-size:12px;color:var(--mut);width:40px;text-align:right;flex-shrink:0}

/* ── HORIZ BAR ── */
.hbch{display:flex;flex-direction:column;gap:8px;margin:4px 0 16px}
.hbr{display:flex;align-items:center;gap:8px}
.hbl{font-size:12px;font-weight:600;width:110px;flex-shrink:0;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbt{flex:1;background:var(--soft);border-radius:3px;height:22px;overflow:hidden}
.hbf{height:100%;background:var(--ink);border-radius:3px;display:flex;align-items:center;padding:0 7px;color:#fff;font-size:11px;font-weight:700;min-width:24px}
.hbv{font-size:11px;color:var(--mut);width:80px;flex-shrink:0}

/* ── TABLE ── */
.tw{border:1.5px solid var(--b);border-radius:10px;overflow:hidden;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:4px}
table{width:100%;border-collapse:collapse;min-width:400px}
th{background:var(--soft);color:var(--mut);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:9px 11px;text-align:right;white-space:nowrap;cursor:pointer;user-select:none;position:relative}
th:first-child{text-align:left}
th:hover{background:#eee}
th.sorted-asc::after{content:' ▲';font-size:9px}
th.sorted-desc::after{content:' ▼';font-size:9px}
td{padding:9px 11px;border-top:1px solid var(--b);text-align:right;font-size:13px}
td:first-child{text-align:left;font-weight:600}
tr:hover td{background:#fafafa}
.best{color:var(--grn);font-weight:700}.wrst{color:var(--red)}.mute{color:var(--mut);font-size:12px}

/* ── COMMERCIAL ── */
.comg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(min-width:600px){.comg{grid-template-columns:repeat(4,1fr)}}
.comc{border:1.5px solid var(--b);border-radius:10px;padding:12px 13px}
.comc.calc{background:var(--soft)}
.coml{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-bottom:7px}
.comc input{width:100%;border:none;border-bottom:1.5px solid var(--b);font-size:18px;font-weight:800;padding:3px 0;background:transparent;color:var(--ink);outline:none;font-family:inherit}
.comc input:focus{border-color:var(--ink)}
.comc input::placeholder{color:#ccc}
.cv{font-size:18px;font-weight:800}
.cn{font-size:10px;color:var(--mut);margin-top:3px}

/* ── EMPTY ── */
.empty{border:1.5px solid var(--b);border-radius:12px;padding:40px 20px;text-align:center;margin-top:16px}
.empty h3{font-size:15px;font-weight:700;margin-bottom:6px}
.empty p{font-size:13px;color:var(--mut)}

/* ── EXTRAS & CONCLUSION & ANÁLISIS ── */
#extP,#anaP{display:none}
#extP.vis,#anaP.vis{display:block}
.eg{display:grid;grid-template-columns:1fr;gap:16px;margin-top:16px}
@media(min-width:700px){.eg{grid-template-columns:1fr 1fr}}
@media(min-width:1000px){.eg{grid-template-columns:1fr 1fr 1fr}}
.ec{border:1.5px solid var(--b);border-radius:12px;padding:16px}
.et{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--mut);margin-bottom:12px}
.exbr{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.exbl{font-size:12px;font-weight:600;width:90px;flex-shrink:0}
.exbw{flex:1;background:var(--soft);border-radius:3px;height:20px;overflow:hidden}
.exbf{height:100%;background:var(--ink);border-radius:3px;display:flex;align-items:center;padding-left:6px;color:#fff;font-size:10px;font-weight:700}
.exbp{font-size:11px;color:var(--mut);width:38px;text-align:right;flex-shrink:0}
.exsub{font-size:11px;color:var(--mut);margin:-5px 0 8px 98px}

.insight{border-left:3px solid var(--b);padding:8px 10px;margin-bottom:10px;border-radius:0 6px 6px 0}
.insight.good{border-color:var(--grn)}
.insight.warn{border-color:var(--amb)}
.insight.info{border-color:var(--mut)}
.insight h4{font-size:12px;font-weight:700;margin-bottom:3px}
.insight p{font-size:12px;color:#444;line-height:1.5}

.badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px;border:1.5px solid;vertical-align:middle;margin-left:6px}
.bw{border-color:var(--amb);color:var(--amb)}
.fnote{font-size:11px;color:var(--mut);margin-top:32px;padding-top:12px;border-top:1px solid var(--b);line-height:1.6}
.hidden{display:none!important}
</style>

/* ════════════════════════════════════════
   FORMATTERS — defensivos contra undefined/NaN/null
   ════════════════════════════════════════ */
function safe(v){ return (v===null||v===undefined||isNaN(v)); }
const fARS = v => safe(v)?'—': v>=1e6?'$'+(v/1e6).toFixed(2)+'M':'$'+Math.round(v).toLocaleString('es-AR');
const fN   = v => safe(v)?'—':Math.round(v).toLocaleString('es-AR');
const fP   = (v,d=1) => safe(v)?'—':Number(v).toFixed(d)+'%';
const fCPR = v => safe(v)?'—':'$'+Math.round(v).toLocaleString('es-AR');
const fX   = v => safe(v)?'—':'x'+Number(v).toFixed(2);

function dlta(cur,prev,inv=false,lbl='vs sem ant.'){
  if(safe(cur)||safe(prev)||prev===0) return '';
  const d=((cur-prev)/prev)*100;
  if(safe(d)) return '';
  const good=inv?d<0:d>0;
  return `<span class="${good?'up':'dn'}">${d>0?'↑':'↓'} ${Math.abs(d).toFixed(1)}% ${lbl}</span>`;
}

/* ════════════════════════════════════════
   DERIVED METRICS  — siempre calculadas on-the-fly
   ════════════════════════════════════════ */
function enrich(datos){
  if(!datos) return null;
  const d=Object.assign({},datos);
  d.cpr  = d.res>0   ? d.spend/d.res      : null;
  d.cpm  = d.imp>0   ? d.spend/d.imp*1000 : null;
  d.ctr  = d.imp>0   ? d.clk/d.imp*100    : null;
  d.freq = d.alc>0   ? d.imp/d.alc        : null;
  d.h25  = d.imp>0   ? d.v25/d.imp*100    : null;
  // enrich each curso
  d.cursos = {};
  Object.entries(datos.cursos||{}).forEach(([k,c])=>{
    d.cursos[k]=Object.assign({},c,{
      cpr: c.r>0   ? c.spend/c.r       : null,
      ctr: c.imp>0 ? c.clk/c.imp*100   : null,
      h25: c.imp>0 ? c.v25/c.imp*100   : null,
      freq:c.alc>0 ? c.imp/c.alc       : null
    });
  });
  return d;
}

function getTot(mes){
  const ss=Object.values(D.meses[mes].semanas).filter(s=>s.activa&&s.datos);
  if(!ss.length) return null;
  const t={spend:0,res:0,imp:0,alc:0,clk:0,v25:0,v50:0,v75:0,v95:0,v100:0,cursos:{},com:{cot:null,cie:null,fac:null}};
  ss.forEach(s=>{
    const d=s.datos;
    t.spend+=d.spend;t.res+=d.res;t.imp+=d.imp;t.alc+=d.alc;t.clk+=d.clk;
    t.v25+=d.v25;t.v50+=d.v50;t.v75+=d.v75;t.v95+=d.v95;t.v100+=d.v100;
    Object.entries(d.cursos||{}).forEach(([k,c])=>{
      if(!t.cursos[k]) t.cursos[k]={r:0,spend:0,imp:0,alc:0,clk:0,v25:0,v50:0,v75:0,v95:0,v100:0};
      const tc=t.cursos[k];
      tc.r+=c.r;tc.spend+=c.spend;tc.imp+=c.imp;tc.alc+=c.alc;tc.clk+=c.clk;
      tc.v25+=c.v25;tc.v50+=c.v50;tc.v75+=c.v75;tc.v95+=c.v95;tc.v100+=c.v100;
    });
  });
  return enrich(t);
}

function getPrev(mes,semKey){
  const keys=Object.keys(D.meses[mes].semanas);
  for(let i=keys.indexOf(semKey)-1;i>=0;i--){
    const s=D.meses[mes].semanas[keys[i]];
    if(s.activa&&s.datos) return enrich(s.datos);
  }
  return null;
}

function renderNav(){
  document.getElementById('mesTabs').innerHTML=
    Object.entries(D.meses).map(([k,m])=>{
      const has=Object.values(m.semanas).some(s=>s.activa&&s.datos);
      return `<button class="tab ${k===aMes?'on':''} ${!has&&k!==aMes?'dis':''}" onclick="swM('${k}')">${m.label}</button>`;
    }).join('');

  const sem=D.meses[aMes].semanas;
  const hasTot=Object.values(sem).some(s=>s.activa&&s.datos);
  let h=Object.entries(sem).map(([k,s])=>{
    const on=aSem===k?'on':'';
    const dis=(!s.activa&&!s.datos)?'dis':'';
    const liv=s.parcial?'liv':'';
    const fn=s.activa||s.datos?`swS('${k}')`:'';
    return `<button class="tab ${on} ${dis} ${liv}" onclick="${fn}">${s.label}</button>`;
  }).join('');
  if(hasTot) h+=`<button class="tab ${aSem==='tot'?'on':''}" onclick="swS('tot')">Totales</button>`;
  document.getElementById('semTabs').innerHTML=h;
}

function kpi(label,val,sub,d='',hi=false){
  return `<div class="kc ${hi?'hi':''}">
    <div class="kl">${label}</div>
    <div class="kv">${val}</div>
    ${sub?`<div class="ks">${sub}</div>`:''}
    ${d?`<div class="kd">${d}</div>`:''}
  </div>`;
}

/* ════════════════════════════════════════
   DUAL BAR CHART
   ════════════════════════════════════════ */
function dualChart(cursos){
  const rows=Object.entries(cursos)
    .map(([k,c])=>({lbl:k,r:c.r||0,cpr:c.cpr||0}))
    .sort((a,b)=>b.r-a.r);
  const maxR=Math.max(...rows.map(r=>r.r))||1;
  const maxCPR=Math.max(...rows.map(r=>r.cpr))||1;
  const CH=140;
  const groups=rows.map(r=>{
    const hR=Math.max(16,Math.round(r.r/maxR*CH));
    const hC=Math.max(16,Math.round(r.cpr/maxCPR*CH));
    const abbr=r.lbl.length>9?r.lbl.slice(0,8)+'…':r.lbl;
    return `<div class="cg" title="${r.lbl}">
      <div class="cbars" style="height:${CH}px">
        <div class="cb cb-r" style="height:${hR}px"><span class="cnum">${r.r}</span></div>
        <div class="cb cb-cpr" style="height:${hC}px"><span class="cnum" style="color:var(--mut)">${fCPR(r.cpr)}</span></div>
      </div>
      <div class="clabel">${abbr}</div>
    </div>`;
  }).join('');
  return `<div class="chart-legend">
    <div class="cleg"><span class="csq csq-r"></span> Conversaciones</div>
    <div class="cleg"><span class="csq csq-cpr"></span> CPR (escala propia)</div>
  </div>
  <div class="chart-wrap"><div class="chart">${groups}</div></div>`;
}

/* ════════════════════════════════════════
   SORTABLE TABLE
   ════════════════════════════════════════ */
let _sortState={};
function makeSortable(tid){
  const tbl=document.getElementById(tid);
  if(!tbl) return;
  tbl.querySelectorAll('th').forEach((th,col)=>{
    th.onclick=()=>{
      const cur=_sortState[tid+col]||'none';
      const asc=cur!=='asc';
      _sortState[tid+col]=asc?'asc':'desc';
      const tbody=tbl.querySelector('tbody');
      const rows=[...tbody.querySelectorAll('tr')];
      rows.sort((a,b)=>{
        const av=(a.cells[col]?.textContent||'').trim();
        const bv=(b.cells[col]?.textContent||'').trim();
        const an=parseFloat(av.replace(/[^0-9.-]/g,''));
        const bn=parseFloat(bv.replace(/[^0-9.-]/g,''));
        if(!isNaN(an)&&!isNaN(bn)) return asc?an-bn:bn-an;
        return asc?av.localeCompare(bv,'es'):bv.localeCompare(av,'es');
      });
      rows.forEach(r=>tbody.appendChild(r));
      tbl.querySelectorAll('th').forEach(h=>{h.className='';});
      th.className=asc?'sorted-asc':'sorted-desc';
    };
  });
}

  const cprs=ce.map(([,c])=>c.cpr).filter(v=>!safe(v));
  const minCPR=Math.min(...cprs), maxCPR=Math.max(...cprs);
  h+=`<div class="tw"><table id="tblC">
    <thead><tr>
      <th>Curso</th><th>Conv.</th><th>CPR (ARS)</th><th>Inversión</th><th>% Total</th><th>CTR</th><th>Hook 25%</th>
    </tr></thead><tbody>`;
  ce.forEach(([k,c])=>{
    const pct=d.res>0?(c.r/d.res*100):0;
    h+=`<tr>
      <td>${k}</td>
      <td>${fN(c.r)}</td>
      <td class="${c.cpr===minCPR?'best':c.cpr===maxCPR?'wrst':''}">${fCPR(c.cpr)}</td>
      <td>${fARS(c.spend)}</td>
      <td>${fP(pct)}</td>
      <td>${fP(c.ctr)}</td>
      <td>${fP(c.h25)}</td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;

  /* ── 2. INTERACCIÓN Y COSTOS ── */
  h+=`<div class="sec">2 · Interacción y Costos</div>`;
  h+=`<div class="kg k7">
    ${kpi('Impresiones',fN(d.imp),'',dlta(d.imp,prev?.imp))}

    ${kpi('CPM',fCPR(d.cpm)+' ARS','por mil imp',dlta(d.cpm,prev?.cpm,true))}
    ${kpi('CTR',fP(d.ctr),'clics / imp',dlta(d.ctr,prev?.ctr),true)}
    ${kpi('Clics',fN(d.clk),'',dlta(d.clk,prev?.clk))}
    ${kpi('CPR',fCPR(d.cpr)+' ARS','costo por conv.',dlta(d.cpr,prev?.cpr,true))}
    ${kpi('Inversión',fARS(d.spend),'ARS','')}

  /* ── Barras inversión por curso ── */
  const maxSp=Math.max(...ce.map(([,c])=>c.spend))||1;
  h+=`<div class="hbch">`;
  ce.forEach(([k,c])=>{
    const w=Math.max(10,Math.round(c.spend/maxSp*100));
    h+=`<div class="hbr">
      <div class="hbl">${k}</div>
      <div class="hbt"><div class="hbf" style="width:${w}%">${fARS(c.spend)}</div></div>
      <div class="hbv">${fN(c.r)} conv.</div>

  h+=`</div>`;

  /* ── 3. VIDEO Y RETENCIÓN ── */
  h+=`<div class="sec">3 · Video y Retención</div>`;
  const r25=safe(d.imp)?null:d.v25/d.imp*100;

    const w=Math.max(3,Math.round((s.v||0)/maxRet*100));

  h+=`<script>window._sp=${d.spend};window._rv=${d.res};<\/script>`;

  /* ── 5. POR ANUNCIO ── */

function calcCom(){

  const fac=parseFloat(document.getElementById('iFac')?.value)||0;
  const sp=window._sp||0, rv=window._rv||0;
  const s=id=>document.getElementById(id);
  const sv=(id,v)=>{const el=s(id);if(el)el.textContent=v;};
  sv('cCAC',  cie>0?fCPR(sp/cie)+' ARS':'—');
  sv('cTC',   cot>0?fP(cie/cot*100):'—');
  sv('cROAS', sp>0&&fac>0?fX(fac/sp):'—');
  sv('cTick', cie>0&&fac>0?fARS(fac/cie):'—');
  sv('cCQ',   rv>0&&cot>0?fP(cot/rv*100):'—');
}

/* ════════════════════════════════════════
   ANÁLISIS JUNIO — mes cerrado (qué y por qué)
   ════════════════════════════════════════ */
function renderAna(){
  const s3=enrich(D.meses.junio_2026.semanas.S3.datos);
  const s4=enrich(D.meses.junio_2026.semanas.S4.datos);
  const mes=getTot('junio_2026');

  // CPR por curso (mes)
  const cur=Object.entries(mes.cursos).map(([k,c])=>({k,r:c.r,cpr:c.r>0?c.spend/c.r:Infinity,spend:c.spend,hook:c.imp>0?c.v25/c.imp*100:0}));
  const byCpr=[...cur].sort((a,b)=>a.cpr-b.cpr);
  const best=byCpr[0], worst=byCpr[byCpr.length-1];

  // Top 3 anuncios por conversaciones
  const top=[...D.adsByMonth.junio_2026].sort((a,b)=>b.r-a.r).slice(0,3);

  let h=`<div class="sec">Análisis de Junio 2026 — Mes cerrado <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">— solo Meta Ads</span></div>`;

  /* KPIs globales */
  h+=`<div class="kg k4">
    ${kpi('Inversión mes',fARS(mes.spend),'Jun 15–30 (activo)',' ',true)}
    ${kpi('Conversaciones',fN(mes.res),'mensajes iniciados','',true)}
    ${kpi('CPR promedio',fCPR(mes.cpr)+' ARS','costo por conv.')}
    ${kpi('Impresiones',fN(mes.imp),'total del mes')}
  </div>`;
  h+=`<div class="kg k4" style="margin-top:8px">
    ${kpi('Mejor curso',best.k,fCPR(best.cpr)+' CPR')}
    ${kpi('Peor curso',worst.k,fCPR(worst.cpr)+' CPR')}
    ${kpi('Frecuencia',safe(mes.freq)?'—':Number(mes.freq).toFixed(2)+'x','imp / alcance ponderado')}
    ${kpi('Hook rate',fP(mes.h25),'v25 / impresiones')}
  </div>`;

  /* S3 vs S4 */
  h+=`<div class="sec">Comparativa S3 (15–21) vs S4 (22–30)</div>`;
  const rows=[
    ['Inversión',fARS(s3.spend),fARS(s4.spend),(s4.spend-s3.spend)/s3.spend*100,false],
    ['Conversaciones',fN(s3.res),fN(s4.res),(s4.res-s3.res)/s3.res*100,false],
    ['CPR',fCPR(s3.cpr),fCPR(s4.cpr),(s4.cpr-s3.cpr)/s3.cpr*100,true],
    ['CPM',fCPR(s3.cpm),fCPR(s4.cpm),(s4.cpm-s3.cpm)/s3.cpm*100,true],
    ['CTR',fP(s3.ctr),fP(s4.ctr),(s4.ctr-s3.ctr)/s3.ctr*100,false],
    ['Frecuencia',fP(s3.freq,2),fP(s4.freq,2),(s4.freq-s3.freq)/s3.freq*100,true],
    ['Hook Rate',fP(s3.h25),fP(s4.h25),(s4.h25-s3.h25)/s3.h25*100,false]
  ];
  h+=`<div class="tw"><table><thead><tr><th>Métrica</th><th>S3 (15–21)</th><th>S4 (22–30)</th><th>Δ%</th></tr></thead><tbody>`;
  rows.forEach(([m,a,b,dp,inv])=>{
    const good=inv?dp<0:dp>0;
    h+=`<tr><td>${m}</td><td>${a}</td><td>${b}</td><td class="${good?'best':'wrst'}">${dp>0?'+':''}${dp.toFixed(1)}%</td></tr>`;
  });
  h+=`</tbody></table></div>`;

  /* Top 3 anuncios */
  h+=`<div class="sec">Top 3 anuncios del mes (por conversaciones)</div>`;
  h+=`<div class="tw"><table><thead><tr><th>Anuncio</th><th>Tipo</th><th>Conv.</th><th>CPR</th><th>Hook 25%</th></tr></thead><tbody>`;
  top.forEach(a=>{
    const hk=a.imp>0?a.v25/a.imp*100:null;
    h+=`<tr><td>${a.n}</td><td class="mute">${a.t}</td><td>${fN(a.r)}</td><td>${fCPR(a.cpr)}</td><td>${fP(hk)}</td></tr>`;
  });
  h+=`</tbody></table></div>`;

  /* Lecturas — qué y por qué */
  h+=`<div class="sec">Lectura del mes — qué pasó y por qué</div>`;
  const ins=[
    {t:'good',ti:'La segunda mitad del mes fue mucho más eficiente',
      tx:`De S3 a S4 la inversión subió +51% (${fARS(s3.spend)} → ${fARS(s4.spend)}) pero las conversaciones se duplicaron (+104%), así que el CPR bajó 26% (${fCPR(s3.cpr)} → ${fCPR(s4.cpr)}). El algoritmo salió de fase de aprendizaje y encontró audiencia más calificada sin cambiar creativos.`},
    {t:'good',ti:'Bartender y Pelu Canina traccionaron el volumen',
      tx:`Bartender pasó de 24 a 207 conversaciones y Pelu Canina de 64 a 206 entre S3 y S4. Son los dos cursos que el sistema priorizó al escalar presupuesto, y cerraron el mes como los de menor CPR (${fCPR(best.cpr)} Bartender).`},
    {t:'warn',ti:'Barbería se frenó al escalar',
      tx:`Barbería cayó de 45 conversaciones en S3 a 15 en S4 y su CPR subió a ~$554. Cuando el presupuesto se concentró en los cursos ganadores, Barbería perdió entrega. Candidato a aislar en su propio conjunto o refrescar creativo.`},
    {t:'warn',ti:'Rep. Celulares es el curso más caro del mes',
      tx:`Cerró junio en ${fCPR(worst.cpr)} por conversación, muy por encima del promedio de ${fCPR(mes.cpr)}. Volumen bajo (37 conv) y CTR flojo: conviene revisar segmentación y oferta antes de sostener inversión.`},
    {t:'info',ti:'Retención de video sólida pero con caída al escalar',
      tx:`El hook rate del mes fue ${fP(mes.h25)} (v25/impresiones). Bajó de ${fP(s3.h25)} en S3 a ${fP(s4.h25)} en S4: al ampliar audiencia entra público más frío, algo esperable. Lashista es el de mejor retención (hook ~17%), señal de creativo fuerte pese a su CPR alto.`},
    {t:'info',ti:'Frecuencia bajo control — hay espacio para escalar',
      tx:`La frecuencia ponderada del mes fue ${safe(mes.freq)?'—':Number(mes.freq).toFixed(2)}x, sin señales de saturación de audiencia. Se puede seguir subiendo presupuesto en los cursos ganadores sin quemar público en el corto plazo.`}
  ];
  ins.forEach(i=>{ h+=`<div class="insight ${i.t}"><h4>${i.ti}</h4><p>${i.tx}</p></div>`; });

  h+=`<p style="font-size:11px;color:var(--mut);font-style:italic;margin:16px 0 4px;line-height:1.6"><em>Análisis basado únicamente en datos de Meta Ads. A falta de feedback del cliente, faltan datos de negocio relevantes —cotizaciones, cierres/inscripciones, facturación y ticket promedio— sin los cuales no es posible medir rentabilidad real (CAC, ROAS, tasa de cierre) ni saber qué curso es más rentable más allá del costo por conversación.</em></p>`;

  document.getElementById('anaC').innerHTML=h;
}

/* ════════════════════════════════════════
   EXTRAS + CONCLUSIÓN
   ════════════════════════════════════════ */
function renderExt(){
  const e=D.extras;
  const maxG=Math.max(...e.genero.map(g=>g.spend));
  const maxP=Math.max(...e.plataforma.map(p=>p.spend));

  /* Conclusiones cruzadas — actualizadas con mes cerrado + Julio */
  const jun=getTot('junio_2026');
  const js1=enrich(D.meses.julio_2026.semanas.S1.datos);
  const js2=enrich(D.meses.julio_2026.semanas.S2.datos);
  const insights=[
    {
      t:'good',ti:'Junio cerró en $458 de CPR con 982 conversaciones',
      tx:`El mes completo (15–30 Jun activo) sumó ${fARS(jun.spend)} de inversión y ${fN(jun.res)} conversaciones. La eficiencia mejoró fuerte en la segunda quincena (CPR de S4 ${fCPR(enrich(D.meses.junio_2026.semanas.S4.datos).cpr)} vs S3 ${fCPR(enrich(D.meses.junio_2026.semanas.S3.datos).cpr)}).`
    },
    {
      t:'good',ti:'Bartender y Pelu Canina fueron los motores',
      tx:`Cerraron el mes con el mayor volumen y el menor CPR. Son los cursos donde el algoritmo concentró la entrega al escalar, y conviene sostenerlos como base del presupuesto.`
    },
    {
      t:'warn',ti:'Julio arrancó más caro',
      tx:`En Julio el CPR subió de ${fCPR(js1.cpr)} (S1) a ${fCPR(js2.cpr)} (S2) con menos conversaciones (${fN(js1.res)} → ${fN(js2.res)}). Maquillaje se enfrió tras un S1 muy fuerte (137 conv) y Pelu Canina tomó el liderazgo. Vale la pena vigilar fatiga de creativo.`
    },
    {
      t:'warn',ti:'Rep. Celulares y Barbería, a revisar',
      tx:`Rep. Celulares sigue siendo el curso más caro por conversación y Barbería pierde entrega cuando se escala el resto. Candidatos a refrescar creativo o aislar presupuesto.`
    },
    {
      t:'info',ti:'Distribución por plataforma y género estable',
      tx:`Facebook concentra ~66% de la inversión e Instagram ~28%. La audiencia es mayormente femenina (~80%). Datos orientativos de los últimos 30 días, no cambian con el selector de semana.`
    },
    {
      t:'info',ti:'Falta data de negocio para medir rentabilidad',
      tx:`Todo el análisis es sobre métricas de Meta. Sin cotizaciones, cierres y facturación del cliente no se puede calcular CAC, ROAS ni tasa de cierre reales. Los campos comerciales del dashboard están listos para cargarse cuando Pierre los informe.`
    }
  ];

  let h=`<div class="eg">
    <div class="ec">
      <div class="et">Género · últimos 30 días</div>`;
  e.genero.forEach(g=>{
    const w=Math.max(8,Math.round(g.spend/maxG*100));
    h+=`<div class="exbr">
      <div class="exbl">${g.l}</div>
      <div class="exbw"><div class="exbf" style="width:${w}%">${g.pct}%</div></div>
      <div class="exbp">${g.pct}%</div>
    </div>
    <div class="exsub">${fARS(g.spend)} · ${fN(g.alc)} alcance · ${fN(g.clk)} clics</div>`;
  });
  h+=`</div>
    <div class="ec">
      <div class="et">Plataforma · últimos 30 días</div>`;
  e.plataforma.forEach(p=>{
    const w=Math.max(8,Math.round(p.spend/maxP*100));
    h+=`<div class="exbr">
      <div class="exbl">${p.l}</div>
      <div class="exbw"><div class="exbf" style="width:${w}%">${p.pct}%</div></div>
      <div class="exbp">${p.pct}%</div>
    </div>
    <div class="exsub">${fARS(p.spend)} · CTR ${p.ctr}% · CPM $${fN(p.cpm)}</div>`;
  });
  h+=`</div>
    <div class="ec">
      <div class="et">Conclusiones · Cruce de datos</div>`;
  insights.forEach(i=>{
    h+=`<div class="insight ${i.t}"><h4>${i.ti}</h4><p>${i.tx}</p></div>`;
  });
  h+=`</div></div>`;
  h+=`<p style="font-size:11px;color:var(--mut);font-style:italic;margin:12px 0;"><em>Género y plataforma: ${e.periodo} (ventana rodante de Meta, no se repulló). Conclusiones: Jun 15–30 + Jul 1–14.</em></p>`;
  document.getElementById('extC').innerHTML=h;
}

/* ════════════════════════════════════════
   RENDER CONTENT
   ════════════════════════════════════════ */
function renderContent(){
  const mc=document.getElementById('mainC');
  const sem=D.meses[aMes].semanas;

  if(aSem==='tot'){
    const t=getTot(aMes);
    if(!t){mc.innerHTML='<div class="empty"><h3>Sin datos</h3><p>No hay semanas activas.</p></div>';return;}
    mc.innerHTML=build(t,null,true,false);
    setTimeout(()=>{makeSortable('tblC');calcCom();},0);
    return;
  }

  const s=sem[aSem];
  if(!s){mc.innerHTML='';return;}
  if(!s.activa||!s.datos){
    mc.innerHTML=`<div class="empty">
      <h3>Sin actividad este período</h3>
      <p>Las campañas no estuvieron activas durante ${s.label.replace(/S\d+:\s/,'')}.</p>
    </div>`;
    return;
  }
  const d=enrich(s.datos);
  const prev=getPrev(aMes,aSem);
  mc.innerHTML=build(d,prev,false,s.parcial);
  setTimeout(()=>{makeSortable('tblC');makeSortable('tblA');calcCom();},0);
}

/* ════════════════════════════════════════
   ACTIONS
   ════════════════════════════════════════ */
function swM(k){
  aMes=k;
  const sem=D.meses[k].semanas;
  aSem=Object.keys(sem).find(s=>sem[s].activa&&sem[s].datos)||Object.keys(sem)[0];
  render();
}
function swS(k){aSem=k;render();}

function showPanel(which){
  showExt = which==='ext';
  showAna = which==='ana';
  const anyP = showExt||showAna;
  document.getElementById('extP').classList.toggle('vis',showExt);
  document.getElementById('anaP').classList.toggle('vis',showAna);
  document.getElementById('mainC').classList.toggle('hidden',anyP);
  document.getElementById('navArea').classList.toggle('hidden',anyP);
  document.getElementById('extBtn').classList.toggle('on',showExt);
  document.getElementById('anaBtn').classList.toggle('on',showAna);
  if(showExt) renderExt();
  if(showAna) renderAna();
  if(!anyP) renderContent();
}
function toggleExt(){ showPanel(showExt?null:'ext'); }
function toggleAna(){ showPanel(showAna?null:'ana'); }

function render(){
  renderNav();
  if(!showExt&&!showAna) renderContent();
}

render();
</script>
